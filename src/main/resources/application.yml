server:
  port: 8083

spring:
  application:
    name: student-platform-backend

  output:
    ansi:
      enabled: always

  config:
    import: optional:application-secret.yml

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://42.194.198.252:3306/student_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: turing
    password: tufirewall24

  data:
    redis:
      host: 42.194.198.252
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.student.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,heapdump,threaddump
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
  prometheus:
    metrics:
      export:
        enabled: true


langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: sk-86094d27647a4acfafc67ebb849e7de5
      model-name: deepseek-chat
    streaming-chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: sk-86094d27647a4acfafc67ebb849e7de5
      model-name: deepseek-chat
    vision-chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: sk-86094d27647a4acfafc67ebb849e7de5
      model-name: deepseek-chat

jwt:
  secret: dummy-jwt-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000

logging:
  level:
    com.student.platform: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/student-platform.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 100MB
